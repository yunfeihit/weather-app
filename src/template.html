<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>Weather APP</div>
    <br>

    <form id="location-submit-form">
        <label for="location-input">Location:</label>
        <input type="text" id="location-input">
        <button id="submit-location-btn" type="submit">Search</button>
    </form>

    <br>
    <table>
        <tr>
            <td>Location:</td>
            <td id="location-result">NA</td>
        </tr>
        <tr>
            <td>Time:</td>
            <td id="time-result">NA</td>
        </tr>
        <tr>
            <td>Temperature:</td>
            <td id="temperature-result">NA</td>
        </tr>
        <tr>
            <td>Description:</td>
            <td id="description-result">NA</td>
        </tr>
        <tr>
            <td>Feels like:</td>
            <td id="feelsLike-result">NA</td>
        </tr>
        <tr>
            <td>Humidity:</td>
            <td id="humidity-result">NA</td>
        </tr>
        <tr>
            <td>Wind:</td>
            <td id="wind-result">NA</td>
        </tr>
    </table>



</body>
</html>
